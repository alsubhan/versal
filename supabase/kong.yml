_format_version: "2.1"
_transform: true

services:
  - name: auth
    url: http://supabase-auth:9999/
    routes:
      - name: auth-route
        paths:
          - /auth/v1
          - /auth
        strip_path: true
  - name: rest
    url: http://supabase-rest:3000/
    routes:
      - name: rest-route
        paths:
          - /rest/v1
          - /rest
        strip_path: true
  - name: realtime
    url: http://supabase-realtime:4000/
    routes:
      - name: realtime-route
        paths:
          - /realtime
  - name: storage
    url: http://supabase-storage:5000/
    routes:
      - name: storage-route
        paths:
          - /storage
  - name: meta
    url: http://supabase-meta:8080/
    routes:
      - name: meta-route
        paths:
          - /meta

plugins:
  - name: cors
    config:
      origins:
        - '*'
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
        - apikey
        - authorization
        - x-client-info
        - prefer
        - x-supabase-api-version
        - accept-profile
      exposed_headers:
        - content-length
        - content-range
      credentials: true
      max_age: 86400
